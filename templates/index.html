<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okta App Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"/>
    <style>
        :root { font-size: 87.5%; }
        body { margin: 0; }
        main.container { max-width: 1600px; }

        /* ── Header ── */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 0.75rem;
            padding: 0.9rem 0 0.75rem; margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
        }
        .top-bar hgroup { margin: 0; }
        .top-bar hgroup h2 { margin: 0; font-size: 1.15em; }
        .top-bar hgroup p  { margin: 0; color: var(--pico-muted-color); font-size: 0.82em; }

        /* ── Env selector ── */
        .env-bar { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .env-btn {
            padding: 0.2rem 0.75rem; font-size: 0.82em; border-radius: 999px;
            border: 1px solid #bbb; background: #f0f0f0; cursor: pointer;
            color: #333 !important; transition: background 0.15s;
        }
        .env-btn.active { background: #1b6ca8 !important; border-color: #1b6ca8 !important; color: #fff !important; font-weight: 600; }
        .env-btn.env-prod.active { background: #b71c1c !important; border-color: #b71c1c !important; }

        /* ── Filter bar ── */
        .filter-bar {
            display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .filter-btn {
            padding: 0.15rem 0.65rem; font-size: 0.82em; border-radius: 999px;
            border: 1px solid #bbb; background: #f0f0f0; cursor: pointer;
            color: #333 !important; transition: background 0.15s;
        }
        .filter-btn.active-filter {
            background: #1b6ca8 !important; border-color: #1b6ca8 !important;
            color: #fff !important; font-weight: 600;
        }
        #search-box {
            padding: 0.2rem 0.6rem; font-size: 0.85em; border-radius: var(--pico-border-radius);
            border: 1px solid #bbb; outline: none; min-width: 200px;
        }

        /* ── Summary pills ── */
        .pill-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .pill {
            display: inline-flex; align-items: center;
            padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.8em;
            border: 1px solid var(--pico-muted-border-color);
            background: var(--pico-muted-background-color);
        }
        .pill-saml   { background: #e3f0fc; border-color: #90caf9; color: #0d47a1; }
        .pill-oidc   { background: #f3e5f5; border-color: #ce93d8; color: #4a148c; }
        .pill-active { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; }
        .pill-inactive { background: #ffebee; border-color: #ef9a9a; color: #b71c1c; }
        .pill-sel    { background: #fff8e1; border-color: #ffe082; color: #7b5a00; }

        /* ── Table ── */
        #app-table { font-size: 0.86em; margin: 0; }
        #app-table th { white-space: nowrap; position: sticky; top: 0; background: var(--pico-background-color); z-index: 1; }
        #app-table td { vertical-align: middle; }
        #app-table tr.inactive-row { opacity: 0.55; }

        .chip {
            display: inline-flex; align-items: center;
            padding: 0.1rem 0.45rem; border-radius: 999px;
            font-size: 0.8em; white-space: nowrap;
            border: 1px solid var(--pico-muted-border-color);
        }
        .chip-saml   { background: #e3f0fc; border-color: #90caf9; color: #0d47a1; }
        .chip-oidc   { background: #f3e5f5; border-color: #ce93d8; color: #4a148c; }
        .chip-active { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; }
        .chip-inactive { background: #ffebee; border-color: #ef9a9a; color: #b71c1c; }
        .chip-none   { color: var(--pico-muted-color); font-style: italic; }

        /* ── Action button in row ── */
        .row-btn {
            padding: 0.1rem 0.55rem; font-size: 0.78em; border-radius: 4px;
            border: 1px solid #bbb; background: #f5f5f5; cursor: pointer;
            color: #333 !important;
        }
        .row-btn:hover { background: #e0e0e0; }
        .row-btn.danger { border-color: #ef9a9a; color: #b71c1c !important; }
        .row-btn.danger:hover { background: #ffebee; }

        /* ── Bulk action bar ── */
        #bulk-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1e2a3a; color: #fff;
            padding: 0.65rem 1.5rem;
            display: none; align-items: center; flex-wrap: wrap; gap: 0.75rem;
            z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
        }
        #bulk-bar.visible { display: flex; }
        #bulk-count { font-weight: 600; font-size: 0.9em; margin-right: 0.5rem; white-space: nowrap; }
        #bulk-bar select {
            padding: 0.25rem 0.5rem; font-size: 0.82em; border-radius: 4px;
            border: 1px solid #555; background: #2c3e50; color: #fff; min-width: 180px;
        }
        .bulk-btn {
            padding: 0.25rem 0.75rem; font-size: 0.82em; border-radius: 4px;
            border: 1px solid #555; background: #2c3e50; cursor: pointer;
            color: #fff !important; white-space: nowrap;
        }
        .bulk-btn:hover { background: #3d5166; }
        .bulk-btn.ok   { border-color: #4ec9b0; }
        .bulk-btn.warn { border-color: #ce9178; }
        .bulk-btn.danger { border-color: #f48771; }
        .bulk-sep { border-left: 1px solid #444; height: 1.4em; }
        #bulk-clear { margin-left: auto; font-size: 0.78em; color: #aaa; cursor: pointer; }
        #bulk-clear:hover { color: #fff; }

        /* ── Loading / empty ── */
        #loading-msg { text-align: center; padding: 3rem; color: var(--pico-muted-color); font-style: italic; }
        #error-msg   { color: #b71c1c; padding: 1rem; font-size: 0.9em; display: none; }

        footer {
            text-align: center; font-size: 0.85em; color: var(--pico-muted-color);
            margin-top: 2rem; margin-bottom: 4rem;
            padding-top: 1rem; border-top: 1px solid var(--pico-muted-border-color);
        }
    </style>
</head>
<body>
<main class="container">

    <!-- ── Top bar ── -->
    <div class="top-bar">
        <hgroup>
            <h2>Okta App Admin Dashboard</h2>
            <p>SAML &amp; OIDC application management &mdash; v{{ version }}</p>
        </hgroup>
        <div class="env-bar">
            <span style="font-size:0.82em; color:var(--pico-muted-color)">Env:</span>
            <button class="env-btn active" data-env="dev" onclick="setEnv('dev')">DEV</button>
            <button class="env-btn" data-env="stg" onclick="setEnv('stg')">STG</button>
            <button class="env-btn env-prod" data-env="prod" onclick="setEnv('prod')">PROD</button>
            <button onclick="loadApps()" style="margin:0; padding:0.25rem 1rem; font-size:0.85em">Load Apps</button>
        </div>
    </div>

    <!-- ── Error ── -->
    <div id="error-msg"></div>

    <!-- ── Summary pills ── -->
    <div class="pill-bar" id="pill-bar" style="display:none">
        <span class="pill" id="pill-total"></span>
        <span class="pill pill-saml" id="pill-saml"></span>
        <span class="pill pill-oidc" id="pill-oidc"></span>
        <span class="pill pill-active" id="pill-active"></span>
        <span class="pill pill-inactive" id="pill-inactive"></span>
        <span class="pill pill-sel" id="pill-sel" style="display:none"></span>
    </div>

    <!-- ── Filter bar ── -->
    <div class="filter-bar" id="filter-bar" style="display:none">
        <input id="search-box" type="search" placeholder="Search apps…" oninput="applyFilters()">
        <span style="font-size:0.8em; color:var(--pico-muted-color)">Type:</span>
        <button class="filter-btn active-filter" data-type="all" onclick="setTypeFilter('all')">All</button>
        <button class="filter-btn" data-type="SAML_2_0" onclick="setTypeFilter('SAML_2_0')">SAML</button>
        <button class="filter-btn" data-type="OPENID_CONNECT" onclick="setTypeFilter('OPENID_CONNECT')">OIDC</button>
        <span class="bulk-sep" style="border-color:#ddd; height:1.2em"></span>
        <span style="font-size:0.8em; color:var(--pico-muted-color)">Status:</span>
        <button class="filter-btn active-filter" data-status="all" onclick="setStatusFilter('all')">All</button>
        <button class="filter-btn" data-status="ACTIVE" onclick="setStatusFilter('ACTIVE')">Active</button>
        <button class="filter-btn" data-status="INACTIVE" onclick="setStatusFilter('INACTIVE')">Inactive</button>
        <span class="bulk-sep" style="border-color:#ddd; height:1.2em"></span>
        <button class="filter-btn" onclick="selectAllVisible()" style="font-size:0.75em">Select All</button>
        <button class="filter-btn" onclick="clearSelection()" style="font-size:0.75em">Clear</button>
    </div>

    <!-- ── Loading ── -->
    <div id="loading-msg" style="display:none">Loading apps from Okta&hellip; (this may take a moment)</div>

    <!-- ── App table ── -->
    <div style="overflow-x:auto">
        <table id="app-table" style="display:none">
            <thead>
                <tr>
                    <th style="width:2rem"><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>
                    <th onclick="sortBy('label')" style="cursor:pointer">App Name ↕</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Auth Policy</th>
                    <th>Routing Rule</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="app-tbody"></tbody>
        </table>
    </div>

    <footer>Okta App Admin Dashboard &mdash; Local use only</footer>

</main>

<!-- ── Bulk action bar ── -->
<div id="bulk-bar">
    <span id="bulk-count"></span>
    <div class="bulk-sep"></div>

    <span style="font-size:0.8em; opacity:0.7">Policy:</span>
    <select id="bulk-policy-select"><option value="">— select policy —</option></select>
    <button class="bulk-btn ok" onclick="bulkAssignPolicy()">Apply Policy</button>

    <div class="bulk-sep"></div>

    <span style="font-size:0.8em; opacity:0.7">Routing Rule:</span>
    <select id="bulk-rule-select"><option value="">— select rule —</option></select>
    <button class="bulk-btn ok" onclick="bulkAssignRule('add')">Add to Rule</button>
    <button class="bulk-btn warn" onclick="bulkAssignRule('remove')">Remove from Rule</button>

    <div class="bulk-sep"></div>

    <button class="bulk-btn ok" onclick="bulkToggleStatus('activate')">Activate</button>
    <button class="bulk-btn danger" onclick="bulkToggleStatus('deactivate')">Deactivate</button>

    <span id="bulk-clear" onclick="clearSelection()">&times; Clear selection</span>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allApps = [];
let filteredApps = [];
let selectedIds = new Set();
let currentEnv = 'dev';
let typeFilter = 'all';
let statusFilter = 'all';
let sortKey = 'label';
let sortAsc = true;
let policies = [];
let routingRules = [];

// ── Env ────────────────────────────────────────────────────────────────────
function setEnv(env) {
    currentEnv = env;
    document.querySelectorAll('.env-btn').forEach(b => b.classList.toggle('active', b.dataset.env === env));
    // Reset state
    allApps = []; filteredApps = []; selectedIds.clear();
    document.getElementById('app-table').style.display = 'none';
    document.getElementById('pill-bar').style.display = 'none';
    document.getElementById('filter-bar').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    updateBulkBar();
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadApps() {
    showError('');
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('app-table').style.display = 'none';
    document.getElementById('pill-bar').style.display = 'none';
    document.getElementById('filter-bar').style.display = 'none';
    selectedIds.clear();

    try {
        const [appsResp, polResp, ruleResp] = await Promise.all([
            fetch(`/api/apps?env=${currentEnv}`),
            fetch(`/api/policies?env=${currentEnv}`),
            fetch(`/api/routing-rules?env=${currentEnv}`),
        ]);
        const appsData  = await appsResp.json();
        const polData   = await polResp.json();
        const ruleData  = await ruleResp.json();

        if (appsData.error) { showError(appsData.error); return; }

        allApps = appsData;
        policies = polData.error ? [] : polData;
        routingRules = ruleData.error ? [] : ruleData;

        populateBulkSelects();
        applyFilters();

        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('app-table').style.display = '';
        document.getElementById('pill-bar').style.display = 'flex';
        document.getElementById('filter-bar').style.display = 'flex';
    } catch (e) {
        showError(`Network error: ${e}`);
    } finally {
        document.getElementById('loading-msg').style.display = 'none';
    }
}

function populateBulkSelects() {
    const ps = document.getElementById('bulk-policy-select');
    ps.innerHTML = '<option value="">— select policy —</option>';
    for (const p of policies) {
        ps.innerHTML += `<option value="${p.id}">${escHtml(p.name)}</option>`;
    }
    const rs = document.getElementById('bulk-rule-select');
    rs.innerHTML = '<option value="">— select rule —</option>';
    for (const r of routingRules) {
        rs.innerHTML += `<option value="${r.id}|${r.policy_id}">${escHtml(r.name)}</option>`;
    }
}

// ── Filters ────────────────────────────────────────────────────────────────
function setTypeFilter(f) {
    typeFilter = f;
    document.querySelectorAll('[data-type]').forEach(b => b.classList.toggle('active-filter', b.dataset.type === f));
    applyFilters();
}
function setStatusFilter(f) {
    statusFilter = f;
    document.querySelectorAll('[data-status]').forEach(b => b.classList.toggle('active-filter', b.dataset.status === f));
    applyFilters();
}

function applyFilters() {
    const q = (document.getElementById('search-box')?.value || '').toLowerCase();
    filteredApps = allApps.filter(a => {
        if (typeFilter !== 'all' && a.sign_on_mode !== typeFilter) return false;
        if (statusFilter !== 'all' && a.status !== statusFilter) return false;
        if (q && !a.label.toLowerCase().includes(q)) return false;
        return true;
    });
    // stable sort
    filteredApps.sort((a, b) => {
        const av = (a[sortKey] || '').toLowerCase();
        const bv = (b[sortKey] || '').toLowerCase();
        return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
    renderTable();
    updatePills();
}

function sortBy(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = true; }
    applyFilters();
}

// ── Render table ───────────────────────────────────────────────────────────
function renderTable() {
    const tbody = document.getElementById('app-tbody');
    tbody.innerHTML = '';
    for (const a of filteredApps) {
        const checked = selectedIds.has(a.id) ? 'checked' : '';
        const isActive = a.status === 'ACTIVE';
        const typeChip = a.sign_on_mode === 'SAML_2_0'
            ? '<span class="chip chip-saml">SAML</span>'
            : '<span class="chip chip-oidc">OIDC</span>';
        const statusChip = isActive
            ? '<span class="chip chip-active">Active</span>'
            : '<span class="chip chip-inactive">Inactive</span>';
        const policyCell = a.policy_name
            ? escHtml(a.policy_name)
            : '<span class="chip-none">—</span>';
        const ruleCell = a.routing_rule_name
            ? escHtml(a.routing_rule_name)
            : '<span class="chip-none">—</span>';
        const toggleLabel = isActive ? 'Deactivate' : 'Activate';
        const toggleCls   = isActive ? 'row-btn danger' : 'row-btn';

        const tr = document.createElement('tr');
        if (!isActive) tr.classList.add('inactive-row');
        tr.dataset.id = a.id;
        tr.innerHTML = `
            <td><input type="checkbox" ${checked} onchange="toggleSelect('${a.id}', this.checked)"></td>
            <td style="font-weight:500">${escHtml(a.label)}</td>
            <td>${typeChip}</td>
            <td>${statusChip}</td>
            <td style="font-size:0.9em">${policyCell}</td>
            <td style="font-size:0.9em">${ruleCell}</td>
            <td>
                <button class="${toggleCls}" onclick="singleToggle('${a.id}', '${isActive ? 'deactivate' : 'activate'}', this)">${toggleLabel}</button>
            </td>
        `;
        tbody.appendChild(tr);
    }
    document.getElementById('check-all').checked = false;
}

// ── Selection ──────────────────────────────────────────────────────────────
function toggleSelect(id, checked) {
    if (checked) selectedIds.add(id);
    else selectedIds.delete(id);
    updateBulkBar();
    updatePills();
}
function toggleAll(cb) {
    filteredApps.forEach(a => { if (cb.checked) selectedIds.add(a.id); else selectedIds.delete(a.id); });
    document.querySelectorAll('#app-tbody input[type=checkbox]').forEach(c => c.checked = cb.checked);
    updateBulkBar();
    updatePills();
}
function selectAllVisible() {
    filteredApps.forEach(a => selectedIds.add(a.id));
    document.querySelectorAll('#app-tbody input[type=checkbox]').forEach(c => c.checked = true);
    updateBulkBar();
    updatePills();
}
function clearSelection() {
    selectedIds.clear();
    document.querySelectorAll('#app-tbody input[type=checkbox]').forEach(c => c.checked = false);
    document.getElementById('check-all').checked = false;
    updateBulkBar();
    updatePills();
}

// ── Bulk bar ───────────────────────────────────────────────────────────────
function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    const n = selectedIds.size;
    if (n > 0) {
        bar.classList.add('visible');
        document.getElementById('bulk-count').textContent = `${n} selected`;
    } else {
        bar.classList.remove('visible');
    }
}

// ── Pills ──────────────────────────────────────────────────────────────────
function updatePills() {
    const saml = allApps.filter(a => a.sign_on_mode === 'SAML_2_0').length;
    const oidc = allApps.filter(a => a.sign_on_mode === 'OPENID_CONNECT').length;
    const active = allApps.filter(a => a.status === 'ACTIVE').length;
    const inactive = allApps.filter(a => a.status === 'INACTIVE').length;
    document.getElementById('pill-total').textContent   = `Total: ${allApps.length}`;
    document.getElementById('pill-saml').textContent    = `SAML: ${saml}`;
    document.getElementById('pill-oidc').textContent    = `OIDC: ${oidc}`;
    document.getElementById('pill-active').textContent  = `Active: ${active}`;
    document.getElementById('pill-inactive').textContent = `Inactive: ${inactive}`;
    const selPill = document.getElementById('pill-sel');
    if (selectedIds.size > 0) {
        selPill.textContent = `Selected: ${selectedIds.size}`;
        selPill.style.display = '';
    } else {
        selPill.style.display = 'none';
    }
}

// ── Single row actions ─────────────────────────────────────────────────────
async function singleToggle(appId, action, btn) {
    btn.disabled = true;
    btn.textContent = '…';
    try {
        const resp = await fetch('/api/toggle-status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({env: currentEnv, app_id: appId, action})
        });
        const data = await resp.json();
        if (data.error) { alert(`Error: ${data.error}`); btn.disabled = false; btn.textContent = action === 'deactivate' ? 'Deactivate' : 'Activate'; return; }
        // Update local state
        const app = allApps.find(a => a.id === appId);
        if (app) app.status = data.status;
        applyFilters();
    } catch (e) {
        alert(`Network error: ${e}`);
        btn.disabled = false;
    }
}

// ── Bulk actions ───────────────────────────────────────────────────────────
async function bulkAssignPolicy() {
    const policyId = document.getElementById('bulk-policy-select').value;
    if (!policyId) { alert('Select a policy first.'); return; }
    if (!selectedIds.size) { alert('No apps selected.'); return; }
    if (!confirm(`Apply selected policy to ${selectedIds.size} app(s)?`)) return;

    const resp = await fetch('/api/assign-policy', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({env: currentEnv, app_ids: [...selectedIds], policy_id: policyId})
    });
    const results = await resp.json();
    if (results.error) { alert(`Error: ${results.error}`); return; }

    const policyName = document.getElementById('bulk-policy-select').selectedOptions[0].text;
    const errors = Object.entries(results).filter(([,v]) => v !== 'ok');
    // Update local state
    for (const [id, res] of Object.entries(results)) {
        if (res === 'ok') {
            const a = allApps.find(x => x.id === id);
            if (a) { a.policy_id = policyId; a.policy_name = policyName; }
        }
    }
    applyFilters();
    if (errors.length) alert(`${errors.length} error(s):\n${errors.map(([id,e]) => `${id}: ${e}`).join('\n')}`);
}

async function bulkAssignRule(action) {
    const val = document.getElementById('bulk-rule-select').value;
    if (!val) { alert('Select a routing rule first.'); return; }
    if (!selectedIds.size) { alert('No apps selected.'); return; }
    const [ruleId, rulePolicyId] = val.split('|');
    const ruleName = document.getElementById('bulk-rule-select').selectedOptions[0].text;
    const verb = action === 'add' ? 'add to' : 'remove from';
    if (!confirm(`${verb} routing rule "${ruleName}" for ${selectedIds.size} app(s)?`)) return;

    const resp = await fetch('/api/assign-routing-rule', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({env: currentEnv, app_ids: [...selectedIds], rule_id: ruleId, rule_policy_id: rulePolicyId, action})
    });
    const results = await resp.json();
    if (results.error) { alert(`Error: ${results.error}`); return; }

    const errors = Object.entries(results).filter(([,v]) => v !== 'ok');
    // Update local state
    for (const [id, res] of Object.entries(results)) {
        if (res === 'ok') {
            const a = allApps.find(x => x.id === id);
            if (a) {
                if (action === 'add') { a.routing_rule_id = ruleId; a.routing_rule_name = ruleName; a.routing_policy_id = rulePolicyId; }
                else { a.routing_rule_id = null; a.routing_rule_name = null; a.routing_policy_id = null; }
            }
        }
    }
    applyFilters();
    if (errors.length) alert(`${errors.length} error(s):\n${errors.map(([id,e]) => `${id}: ${e}`).join('\n')}`);
}

async function bulkToggleStatus(action) {
    if (!selectedIds.size) { alert('No apps selected.'); return; }
    if (!confirm(`${action} ${selectedIds.size} app(s)?`)) return;
    const ids = [...selectedIds];
    let errors = [];
    for (const appId of ids) {
        try {
            const resp = await fetch('/api/toggle-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({env: currentEnv, app_id: appId, action})
            });
            const data = await resp.json();
            if (data.error) errors.push(`${appId}: ${data.error}`);
            else {
                const a = allApps.find(x => x.id === appId);
                if (a) a.status = data.status;
            }
        } catch (e) { errors.push(`${appId}: ${e}`); }
    }
    applyFilters();
    if (errors.length) alert(`${errors.length} error(s):\n${errors.join('\n')}`);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg ? `Error: ${msg}` : '';
    el.style.display = msg ? 'block' : 'none';
    if (msg) document.getElementById('loading-msg').style.display = 'none';
}

function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
